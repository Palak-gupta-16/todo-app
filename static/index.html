<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>My Todoss</h1>

    <!-- Add form -->
    <form id="add-form">
      <input id="title" type="text" placeholder="Task title..." required />
      <input id="description" type="text" placeholder="Description (optional)" />
      <button type="submit">Add</button>
    </form>

    <!-- Filter tabs -->
    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="active">Active</button>
      <button class="filter" data-filter="completed">Completed</button>
    </div>

    <!-- Todo list -->
    <ul id="todo-list"></ul>

    <p id="empty-state" class="empty">No todos yet. Add one above!</p>
  </div>

  <!-- Edit modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2>Edit Todo</h2>
      <input id="edit-title" type="text" placeholder="Title" />
      <input id="edit-desc" type="text" placeholder="Description" />
      <div class="modal-actions">
        <button id="save-edit">Save</button>
        <button id="cancel-edit" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
